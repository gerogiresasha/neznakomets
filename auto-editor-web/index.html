<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Автоциклический редактор</title>
    <style>body{margin:0}</style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useRef, useEffect } = React;

      const STYLE = `
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          background: #f5f2ee;
          color: #1a1a1a;
          font-family: 'JetBrains Mono', monospace;
        }

        .app {
          min-height: 100vh;
          background: #f5f2ee;
          padding: 32px 24px;
          max-width: 960px;
          margin: 0 auto;
        }

        .header {
          margin-bottom: 40px;
          border-bottom: 1px solid #ddd8d0;
          padding-bottom: 24px;
        }

        .title {
          font-family: 'Playfair Display', serif;
          font-size: 28px;
          font-weight: 400;
          color: #7a5c3a;
          letter-spacing: -0.5px;
        }

        .subtitle {
          font-size: 11px;
          color: #999;
          margin-top: 6px;
          letter-spacing: 2px;
          text-transform: uppercase;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
          margin-bottom: 16px;
        }

        .field {
          display: flex;
          flex-direction: column;
          gap: 8px;
        }

        .field.full {
          grid-column: 1 / -1;
        }

        .label-row {
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          gap: 12px;
        }

        label {
          font-size: 10px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: #999;
        }

        label span {
          color: #b08060;
          margin-left: 6px;
          font-size: 9px;
        }

        .meta {
          font-size: 10px;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: #b0a79c;
        }

        textarea,
        input[type="number"],
        input[type="text"],
        input[type="password"] {
          background: #fff;
          border: 1px solid #ddd8d0;
          border-radius: 4px;
          color: #1a1a1a;
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          padding: 14px;
          resize: vertical;
          transition: border-color 0.2s;
          outline: none;
          width: 100%;
          line-height: 1.6;
        }

        textarea:focus,
        input[type="number"]:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
          border-color: #b08060;
        }

        textarea::placeholder {
          color: #bbb;
          font-style: italic;
        }

        input[type="number"],
        input[type="text"],
        input[type="password"] {
          resize: none;
          height: 44px;
        }

        .controls-row {
          display: flex;
          align-items: center;
          gap: 20px;
          margin-bottom: 24px;
          flex-wrap: wrap;
        }

        .controls-row input[type="number"] {
          width: 80px;
        }

        .iter-label {
          font-size: 10px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: #999;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .btn-run {
          background: #7a5c3a;
          color: #fff;
          border: none;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          font-weight: 500;
          letter-spacing: 2px;
          text-transform: uppercase;
          padding: 12px 28px;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn-run:hover:not(:disabled) {
          background: #5e4528;
        }

        .btn-run:disabled {
          opacity: 0.4;
          cursor: not-allowed;
        }

        .btn-stop {
          background: transparent;
          color: #d94f4f;
          border: 1px solid #d94f4f66;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
          padding: 12px 20px;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn-stop:hover {
          border-color: #d94f4f;
          background: #d94f4f11;
        }

        .btn-ghost {
          background: transparent;
          color: #7a5c3a;
          border: 1px solid #7a5c3a66;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          letter-spacing: 2px;
          text-transform: uppercase;
          padding: 10px 16px;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn-ghost:hover {
          border-color: #7a5c3a;
          background: #7a5c3a11;
        }

        .btn-copy {
          background: transparent;
          color: #7a5c3a;
          border: 1px solid #7a5c3a66;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          letter-spacing: 1px;
          text-transform: uppercase;
          padding: 8px 16px;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn-copy:hover {
          border-color: #7a5c3a;
          background: #7a5c3a11;
        }

        .btn-toggle {
          background: transparent;
          border: 1px solid #ddd8d0;
          border-radius: 4px;
          padding: 6px 10px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: #7a5c3a;
          cursor: pointer;
        }

        .settings {
          border: 1px solid #ddd8d0;
          border-radius: 4px;
          padding: 12px;
          background: #fbfaf8;
          margin-bottom: 16px;
        }

        .settings-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
        }

        .settings-grid {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 12px;
          margin-top: 12px;
        }

        .note {
          font-size: 11px;
          color: #a08a73;
          margin-top: 8px;
        }

        .log {
          background: #fff;
          border: 1px solid #ddd8d0;
          border-radius: 4px;
          padding: 16px;
          margin-bottom: 16px;
          min-height: 80px;
          max-height: 200px;
          overflow-y: auto;
        }

        .log-entry {
          font-size: 12px;
          line-height: 1.7;
          color: #aaa;
          display: flex;
          gap: 10px;
        }

        .log-entry.active { color: #555; }
        .log-entry.success { color: #3a9e6a; }
        .log-entry.error { color: #d94f4f; }
        .log-entry.info { color: #7a5c3a; }

        .log-time { color: #ccc; min-width: 45px; }

        .iter-badge {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          background: #f0ece6;
          border: 1px solid #ddd8d0;
          border-radius: 3px;
          padding: 4px 10px;
          font-size: 11px;
          color: #999;
          margin-bottom: 12px;
        }

        .iter-badge .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #7a5c3a;
          animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.2; }
        }

        .result-block {
          margin-top: 8px;
        }

        .result-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 10px;
        }

        .score-pill {
          font-size: 11px;
          padding: 3px 10px;
          border-radius: 20px;
          border: 1px solid;
        }

        .score-pill.good { color: #3a9e6a; border-color: #3a9e6a66; background: #3a9e6a11; }
        .score-pill.mid { color: #c08020; border-color: #c0802066; background: #c0802011; }
        .score-pill.bad { color: #d94f4f; border-color: #d94f4f66; background: #d94f4f11; }

        .notes {
          font-size: 11px;
          color: #888;
          font-style: italic;
          margin-top: 8px;
          padding: 8px 12px;
          border-left: 2px solid #ddd8d0;
          line-height: 1.6;
        }

        .anchor-check {
          margin-top: 10px;
          font-size: 11px;
          padding: 8px 12px;
          border-radius: 4px;
          border: 1px solid;
        }

        .anchor-check.good { color: #3a9e6a; border-color: #3a9e6a66; background: #3a9e6a11; }
        .anchor-check.bad { color: #d94f4f; border-color: #d94f4f66; background: #d94f4f11; }

        .anchor-list {
          margin-top: 6px;
          font-size: 10px;
          color: #b44;
        }

        .divider {
          border: none;
          border-top: 1px solid #ddd8d0;
          margin: 20px 0;
        }

        details summary {
          cursor: pointer;
          font-size: 10px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: #999;
          margin-top: 12px;
        }

        .raw {
          margin-top: 8px;
          background: #1b1b1b;
          color: #eaeaea;
          border-radius: 4px;
          padding: 12px;
          font-size: 11px;
          line-height: 1.6;
          overflow-x: auto;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f5f2ee; }
        ::-webkit-scrollbar-thumb { background: #ddd8d0; border-radius: 2px; }

        @media (max-width: 900px) {
          .grid { grid-template-columns: 1fr; }
          .settings-grid { grid-template-columns: 1fr; }
          .controls-row { gap: 12px; }
        }
      `;

      const STORAGE_KEY = "auto-editor-v1";
      const DEFAULT_ENDPOINT = "/api/anthropic";

      function ts() {
        return new Date().toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function countWords(value) {
        if (!value) return 0;
        const matches = value.trim().match(/\S+/g);
        return matches ? matches.length : 0;
      }

      function splitLines(value) {
        if (!value) return [];
        return value
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(Boolean);
      }

      function safeParseJson(raw) {
        const clean = raw.replace(/```(?:json)?/g, "").trim();
        try {
          return { value: JSON.parse(clean) };
        } catch {
          const start = clean.indexOf("{");
          const end = clean.lastIndexOf("}");
          if (start !== -1 && end !== -1 && end > start) {
            try {
              return { value: JSON.parse(clean.slice(start, end + 1)) };
            } catch {
              return { error: "parse_error" };
            }
          }
          return { error: "parse_error" };
        }
      }

      function App() {
        const [text, setText] = useState("");
        const [anchors, setAnchors] = useState("");
        const [criteria, setCriteria] = useState("");
        const [maxIter, setMaxIter] = useState(5);
        const [running, setRunning] = useState(false);
        const [log, setLog] = useState([]);
        const [result, setResult] = useState(null);
        const [currentIter, setCurrentIter] = useState(0);
        const [endpoint, setEndpoint] = useState(DEFAULT_ENDPOINT);
        const [model, setModel] = useState("claude-sonnet-4-20250514");
        const [maxTokens, setMaxTokens] = useState(1000);
        const [temperature, setTemperature] = useState(0.2);
        const [timeoutMs, setTimeoutMs] = useState(30000);
        const [showAdvanced, setShowAdvanced] = useState(false);
        const [lastRaw, setLastRaw] = useState("");
        const stopRef = useRef(false);
        const abortRef = useRef(null);
        const logRef = useRef(null);

        useEffect(() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            if (typeof data.text === "string") setText(data.text);
            if (typeof data.anchors === "string") setAnchors(data.anchors);
            if (typeof data.criteria === "string") setCriteria(data.criteria);
            if (Number.isFinite(data.maxIter)) setMaxIter(data.maxIter);
            if (typeof data.endpoint === "string") setEndpoint(data.endpoint);
            if (typeof data.model === "string") setModel(data.model);
            if (Number.isFinite(data.maxTokens)) setMaxTokens(data.maxTokens);
            if (Number.isFinite(data.temperature)) setTemperature(data.temperature);
            if (Number.isFinite(data.timeoutMs)) setTimeoutMs(data.timeoutMs);
          } catch {
            // ignore corrupted storage
          }
        }, []);

        useEffect(() => {
          const payload = {
            text,
            anchors,
            criteria,
            maxIter,
            endpoint,
            model,
            maxTokens,
            temperature,
            timeoutMs
          };
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          } catch {
            // ignore storage errors
          }
        }, [text, anchors, criteria, maxIter, endpoint, model, maxTokens, temperature, timeoutMs]);

        const addLog = (msg, type = "active") => {
          setLog(prev => [...prev, { msg, type, time: ts() }]);
          setTimeout(() => {
            if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
          }, 50);
        };

        const callClaude = async (messages, sys, signal) => {
          const controller = new AbortController();
          let timedOut = false;
          const onAbort = () => controller.abort();
          if (signal) signal.addEventListener("abort", onAbort, { once: true });
          const timeout = setTimeout(() => {
            timedOut = true;
            controller.abort();
          }, Math.max(1000, Number(timeoutMs) || 30000));

          try {
            const res = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              signal: controller.signal,
              body: JSON.stringify({
                model,
                max_tokens: maxTokens,
                temperature,
                system: sys,
                messages
              })
            });

            const raw = await res.text();
            if (!res.ok) {
              throw new Error(`HTTP ${res.status}: ${raw.slice(0, 200)}`);
            }

            let data;
            try {
              data = JSON.parse(raw);
            } catch {
              throw new Error("Ответ API не JSON");
            }

            if (data.error) throw new Error(data.error.message || "Ошибка API");
            const content = data.content?.[0]?.text;
            if (!content) throw new Error("Пустой ответ модели");
            return content;
          } catch (e) {
            if (e.name === "AbortError" && timedOut) {
              throw new Error(`Таймаут ${timeoutMs}мс`);
            }
            throw e;
          } finally {
            clearTimeout(timeout);
            if (signal) signal.removeEventListener("abort", onAbort);
          }
        };

        const run = async () => {
          if (!text.trim()) return;
          stopRef.current = false;
          setRunning(true);
          setResult(null);
          setLog([]);
          setLastRaw("");
          setCurrentIter(0);

          const sys = `Ты - редактор художественного текста. Ты работаешь с русскоязычным нарративом.
      Твоя задача: улучшить текст строго по критериям, не трогая якоря.
      Отвечай ТОЛЬКО валидным JSON без markdown, пояснений и обрамления. 
      Структура ответа:
      {
        "improved": "улучшенный текст",
        "anchors_ok": true/false,
        "criteria_met": true/false,
        "score": число от 1 до 10,
        "notes": "что сделал и что ещё можно улучшить"
      }`;

          let currentText = text;
          let finalResult = null;
          let iterCount = 0;

          addLog("Запуск автоцикла", "info");

          for (let i = 0; i < maxIter; i++) {
            if (stopRef.current) {
              addLog("Остановлено вручную", "info");
              break;
            }

            iterCount = i + 1;
            setCurrentIter(iterCount);
            addLog(`Итерация ${iterCount}/${maxIter} — отправляю запрос...`);

            try {
              const prompt = `ЯКОРЯ (не менять ни при каких условиях):
      ${anchors || "Не заданы - улучшай свободно"}

      КРИТЕРИИ КАЧЕСТВА:
      ${criteria || "Общее качество художественного текста: живость, напряжение, конкретность деталей"}

      ТЕКСТ ДЛЯ УЛУЧШЕНИЯ:
      ${currentText}

      Улучши текст строго по критериям. Якоря должны остаться нетронутыми.
      Оцени результат честно: anchors_ok=true только если все якоря сохранены, criteria_met=true только если критерии реально достигнуты.
      Score 8+ означает что текст готов и цикл можно останавливать.`;

              const controller = new AbortController();
              abortRef.current = controller;

              const raw = await callClaude([{ role: "user", content: prompt }], sys, controller.signal);
              setLastRaw(raw);

              const parsed = safeParseJson(raw);
              if (!parsed.value) {
                addLog(`Ошибка парсинга ответа на итерации ${iterCount}`, "error");
                continue;
              }

              currentText = parsed.value.improved || currentText;
              finalResult = parsed.value;

              const scoreClass = parsed.value.score >= 8 ? "✓" : parsed.value.score >= 6 ? "~" : "✗";
              addLog(
                `${scoreClass} Оценка: ${parsed.value.score}/10 · якоря: ${parsed.value.anchors_ok ? "ok" : "НАРУШЕНЫ"} · критерии: ${parsed.value.criteria_met ? "да" : "нет"}`,
                parsed.value.score >= 8 && parsed.value.anchors_ok ? "success" : "active"
              );
              if (parsed.value.notes) addLog(`  ↳ ${parsed.value.notes}`, "active");

              if (parsed.value.score >= 8 && parsed.value.anchors_ok && parsed.value.criteria_met) {
                addLog(`Готово после ${iterCount} итераций`, "success");
                break;
              }

              if (i < maxIter - 1 && !stopRef.current) {
                addLog("Продолжаю улучшение...");
                await new Promise(r => setTimeout(r, 300));
              } else if (i === maxIter - 1) {
                addLog(`Достигнут лимит итераций (${maxIter})`, "info");
              }
            } catch (e) {
              if (e.name === "AbortError" && stopRef.current) {
                addLog("Остановлено вручную", "info");
              } else {
                addLog(`Ошибка: ${e.message}`, "error");
              }
              break;
            }
          }

          abortRef.current = null;
          setResult(finalResult ? { ...finalResult, improved: currentText } : null);
          setRunning(false);
        };

        const stop = () => {
          stopRef.current = true;
          if (abortRef.current) abortRef.current.abort();
        };

        const copy = () => {
          if (result?.improved) navigator.clipboard.writeText(result.improved);
        };

        const clearAll = () => {
          setText("");
          setAnchors("");
          setCriteria("");
          setResult(null);
          setLog([]);
          setCurrentIter(0);
          setLastRaw("");
        };

        const scoreClass = result ? (result.score >= 8 ? "good" : result.score >= 6 ? "mid" : "bad") : "";
        const wordCount = countWords(text);
        const charCount = text.length;
        const anchorList = splitLines(anchors);
        const criteriaList = splitLines(criteria);
        const missingAnchors = result?.improved ? anchorList.filter(a => !result.improved.includes(a)) : [];
        const shownMissing = missingAnchors.slice(0, 5);
        const extraMissing = missingAnchors.length - shownMissing.length;

        return (
          <>
            <style>{STYLE}</style>
            <div className="app">
              <div className="header">
                <div className="title">Автоциклический редактор</div>
                <div className="subtitle">Итеративное улучшение текста с самопроверкой</div>
              </div>

              <div className="grid">
                <div className="field full">
                  <div className="label-row">
                    <label>Исходный текст</label>
                    <div className="meta">{wordCount} слов · {charCount} знаков</div>
                  </div>
                  <textarea
                    rows={8}
                    placeholder="Вставь текст который нужно улучшить..."
                    value={text}
                    onChange={e => setText(e.target.value)}
                    disabled={running}
                  />
                </div>

                <div className="field">
                  <div className="label-row">
                    <label>Якоря <span>что нельзя менять</span></label>
                    <div className="meta">{anchorList.length} шт.</div>
                  </div>
                  <textarea
                    rows={5}
                    placeholder={"Цитаты, имена, цифры, ключевые смыслы\nкоторые должны остаться нетронутыми.\n\nПример:\n— Правило восемь. Никогда не влюбляйся.\n— Максим, 38 лет, холодный снаружи\n— Хоспис, мать умирает"}
                    value={anchors}
                    onChange={e => setAnchors(e.target.value)}
                    disabled={running}
                  />
                </div>

                <div className="field">
                  <div className="label-row">
                    <label>Критерии качества <span>чего добиваемся</span></label>
                    <div className="meta">{criteriaList.length} пунктов</div>
                  </div>
                  <textarea
                    rows={5}
                    placeholder={"Что должно измениться в тексте.\n\nПример:\n— Напряжение в каждой фразе\n— Никакой воды и канцелярщины\n— Короткие предложения в кульминации\n— Детали вместо описаний"}
                    value={criteria}
                    onChange={e => setCriteria(e.target.value)}
                    disabled={running}
                  />
                </div>
              </div>

              <div className="controls-row">
                <button className="btn-run" onClick={run} disabled={running || !text.trim()}>
                  {running ? `Итерация ${currentIter}...` : "Запустить"}
                </button>
                {running && (
                  <button className="btn-stop" onClick={stop}>Стоп</button>
                )}
                <button className="btn-ghost" onClick={clearAll} disabled={running}>
                  Очистить
                </button>
                <span className="iter-label">
                  Макс. итераций
                  <input
                    type="number"
                    value={maxIter}
                    min={1}
                    max={20}
                    onChange={e => {
                      const next = Number(e.target.value);
                      if (!Number.isFinite(next)) return;
                      setMaxIter(Math.min(20, Math.max(1, next)));
                    }}
                    disabled={running}
                  />
                </span>
              </div>

              <div className="settings">
                <div className="settings-header">
                  <label>Настройки запроса</label>
                  <button className="btn-toggle" onClick={() => setShowAdvanced(v => !v)}>
                    {showAdvanced ? "Скрыть" : "Показать"}
                  </button>
                </div>
                {showAdvanced && (
                  <div className="settings-grid">
                    <div className="field">
                      <label>Endpoint</label>
                      <input
                        type="text"
                        value={endpoint}
                        onChange={e => setEndpoint(e.target.value)}
                        disabled={running}
                      />
                    </div>
                    <div className="field">
                      <label>Model</label>
                      <input
                        type="text"
                        value={model}
                        onChange={e => setModel(e.target.value)}
                        disabled={running}
                      />
                    </div>
                    <div className="field">
                      <label>Max tokens</label>
                      <input
                        type="number"
                        value={maxTokens}
                        min={64}
                        max={4000}
                        onChange={e => {
                          const next = Number(e.target.value);
                          if (!Number.isFinite(next)) return;
                          setMaxTokens(Math.min(4000, Math.max(64, next)));
                        }}
                        disabled={running}
                      />
                    </div>
                    <div className="field">
                      <label>Temperature</label>
                      <input
                        type="number"
                        step="0.1"
                        min={0}
                        max={1}
                        value={temperature}
                        onChange={e => {
                          const next = Number(e.target.value);
                          if (!Number.isFinite(next)) return;
                          setTemperature(Math.min(1, Math.max(0, next)));
                        }}
                        disabled={running}
                      />
                    </div>
                    <div className="field">
                      <label>Timeout ms</label>
                      <input
                        type="number"
                        min={1000}
                        max={120000}
                        value={timeoutMs}
                        onChange={e => {
                          const next = Number(e.target.value);
                          if (!Number.isFinite(next)) return;
                          setTimeoutMs(Math.min(120000, Math.max(1000, next)));
                        }}
                        disabled={running}
                      />
                    </div>
                  </div>
                )}
                <div className="note">Запрос идет на локальный прокси /api/anthropic.</div>
              </div>

              {log.length > 0 && (
                <div className="log" ref={logRef}>
                  {log.map((entry, i) => (
                    <div key={i} className={`log-entry ${entry.type}`}>
                      <span className="log-time">{entry.time}</span>
                      <span>{entry.msg}</span>
                    </div>
                  ))}
                  {running && (
                    <div className="log-entry active">
                      <span className="log-time"></span>
                      <span style={{ color: "#333" }}>▊</span>
                    </div>
                  )}
                </div>
              )}

              {result && (
                <>
                  <hr className="divider" />
                  <div className="result-block">
                    <div className="result-header">
                      <label>Результат</label>
                      <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                        <span className={`score-pill ${scoreClass}`}>
                          {result.score}/10 · якоря: {result.anchors_ok ? "✓" : "✗"} · критерии: {result.criteria_met ? "✓" : "✗"}
                        </span>
                        <button className="btn-copy" onClick={copy}>Скопировать</button>
                      </div>
                    </div>
                    <textarea
                      rows={10}
                      value={result.improved}
                      onChange={e => setResult(prev => ({ ...prev, improved: e.target.value }))}
                    />
                    {result.notes && (
                      <div className="notes">{result.notes}</div>
                    )}
                    {anchorList.length > 0 && (
                      <div className={`anchor-check ${missingAnchors.length ? "bad" : "good"}`}>
                        Локальная проверка якорей: {missingAnchors.length ? `нет ${missingAnchors.length}` : "ок"}
                        {missingAnchors.length > 0 && (
                          <div className="anchor-list">
                            {shownMissing.join(" • ")}{extraMissing > 0 ? ` • +${extraMissing} еще` : ""}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </>
              )}

              {lastRaw && (
                <details>
                  <summary>Сырой ответ модели</summary>
                  <pre className="raw">{lastRaw}</pre>
                </details>
              )}
            </div>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
